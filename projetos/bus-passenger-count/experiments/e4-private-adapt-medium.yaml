# E4 - Private-domain adaptation with YOLO11m.
# Fixed recipe: e2-public-default + Unicamp private train split.
experiment_id: e4-private-adapt-medium
strategy: direct
weights: yolo11m.pt
dataset_stage: processed
train_datasets:
  - passenger-deakin
  - inside-bus-view
  - onibus-unicamp-private
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
  - onibus-unicamp-private
train_config:
  epochs: 100
  patience: 20
  batch: 16
  imgsz: 640
  workers: 4
  amp: true
  seed: 42
  deterministic: true
