# E2 - Fine-tuning nos 3 datasets de ônibus. Melhor candidato a generalizar.
# Usa augmentation PADRÃO do YOLO (referência para as ablações de aug).
experiment_id: e2-all
strategy: direct
weights: yolo11m.pt
dataset_stage: interim
train_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
train_config:
  epochs: 100
  patience: 20
  batch: 16
  imgsz: 640
  workers: 4
  amp: true
  seed: 42
  deterministic: true
