# E4 - Private-domain adaptation with YOLO11m + bus-specific augmentation.
# Keeps original e4-private-adapt-medium and adds bus-specific aug comparison.
experiment_id: e4-private-adapt-medium-busaug
strategy: direct
weights: yolo11m.pt
dataset_stage: processed
train_datasets:
  - passenger-deakin
  - inside-bus-view
  - onibus-unicamp-private
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
  - onibus-unicamp-private
train_config:
  epochs: 100
  patience: 20
  batch: 16
  imgsz: 640
  workers: 4
  amp: true
  seed: 42
  deterministic: true
augment:
  fliplr: 0.5
  flipud: 0.0
  mosaic: 1.0
  close_mosaic: 10
  hsv_h: 0.03
  hsv_s: 0.7
  hsv_v: 0.0
  degrees: 10.0
  translate: 0.1
  scale: 0.2
  shear: 0.0
  perspective: 0.0
  erasing: 0.0
  blur_px: 50
  blur_p: 0.15
  motion_blur_px: 50
  motion_blur_p: 0.15
  cutout_holes: 3
  cutout_size: 0.10
  cutout_p: 0.50
