# Ablacao A: E2-all com augmentation GEOMETRICA AGRESSIVA (que NAO deveria ajudar).
# Demonstra a hipotese do colega de que distorcoes irreais pioram o modelo:
# shear/perspective (camera estatica nao distorce), flip vertical e rotacao forte
# (passageiros nao ficam deitados/de cabeca pra baixo).
experiment_id: e2-all-aug-bad
strategy: direct
weights: yolo11m.pt
dataset_stage: interim
train_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
  - onibus-unicamp-private
train_config:
  epochs: 100
  patience: 20
  batch: 16
  imgsz: 640
  workers: 4
  amp: true
  seed: 42
  deterministic: true
augment:
  fliplr: 0.5
  flipud: 0.5
  degrees: 45.0
  shear: 10.0
  perspective: 0.001
  mosaic: 1.0
