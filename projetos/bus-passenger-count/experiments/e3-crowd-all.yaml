# E3 - Fine-tuning em estágios (robusto):
#   estagio 1: congela parte da rede e treina no CrowdHuman (robustez a oclusao)
#   estagio 2: descongela e treina nos datasets de onibus (fecha o gap de dominio)
# Os pesos do estagio 1 alimentam o estagio 2.
experiment_id: e3-crowd-all
strategy: two_stage
weights: yolo11m.pt
dataset_stage: interim
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
  - onibus-unicamp-private
stages:
  - name: stage1_crowd
    train_datasets:
      - crowdhuman
    freeze: 10            # congela as ~10 primeiras camadas (backbone)
    train_config:
      epochs: 50
      patience: 15
      batch: 16
      imgsz: 640
      workers: 4
      amp: true
      seed: 42
      deterministic: true
  - name: stage2_bus
    train_datasets:
      - passenger-detection-bus
      - inside-bus-view
      - passenger-deakin
    freeze: 0             # descongela tudo
    train_config:
      epochs: 100
      patience: 20
      batch: 16
      imgsz: 640
      workers: 4
      amp: true
      seed: 42
      deterministic: true
