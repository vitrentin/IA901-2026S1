# E0 - Baseline zero-shot: modelo COCO pré-treinado, SEM fine-tuning.
# Referência (piso) para medir o ganho do fine-tuning.
experiment_id: e0-baseline
strategy: baseline
weights: yolo11m.pt
dataset_stage: interim
# baseline não treina; eval roda direto nos pesos base
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
# quando o dataset privado estiver rotulado, adicionar: unicamp-private
