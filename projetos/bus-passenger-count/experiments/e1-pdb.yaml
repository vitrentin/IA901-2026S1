# E1 - Fine-tuning direto em 1 dataset (passenger-detection-bus).
# Mede o gap in-domain (PDB) vs cross-dataset (IBV, DKN).
experiment_id: e1-pdb
strategy: direct
weights: yolo11m.pt
dataset_stage: interim
train_datasets:
  - passenger-detection-bus
eval_datasets:
  - passenger-detection-bus
  - inside-bus-view
  - passenger-deakin
train_config:
  epochs: 100
  patience: 20
  batch: 16
  imgsz: 640
  workers: 4
  amp: true
  seed: 42
  deterministic: true
